name: Gym Utilization Tracker

# GitHub verwirft geplante schedule-Trigger unter Last massenhaft (beobachtet: nur
# ~8-13 von 48 taeglichen 30-Min-Triggern starten tatsaechlich, alle erfolgreich).
# Dichterer Cron hilft nicht - die wuerden genauso gedroppt. Loesung: jeder Lauf, der
# WIRKLICH startet, sammelt in einer internen Schleife mehrfach (Self-Loop). So wird aus
# unzuverlaessigen Triggern eine regelmaessige Abdeckung.
#
# KOSTEN: Repo ist PUBLIC -> GitHub-Actions-Standard-Runner sind kostenlos und OHNE
# Minutenlimit (auf jedem Plan, auch Free; das 2000-Min-Kontingent gilt nur fuer PRIVATE
# Repos). Damit dieser Workflow guenstig bleibt, muss das Repo oeffentlich bleiben.
# Zusaetzlich bewusst modest gehalten: aktive Stunden dicht, nachts nur 1 Messung
# (nachts ist die Auslastung ~0 und informationsarm), kurze nicht-ueberlappende Laeufe.

on:
  schedule:
    - cron: "*/30 * * * *"     # alle 30 Min ANFORDERN; GitHub feuert nur einen Teil davon
  workflow_dispatch:
    inputs:
      samples:
        description: "Messungen pro Lauf (aktive Stunden)"
        default: "3"
      interval_seconds:
        description: "Sekunden zwischen Messungen"
        default: "480"

# nur EIN Sampler gleichzeitig; weitere Trigger warten statt zu ueberlappen
concurrency:
  group: gym-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest      # Standard-Runner = fuer Public-Repos kostenlos
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # voller Verlauf -> sauberer rebase im Loop

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies
        run: pip install requests

      - name: Sample loop
        env:
          FIREBASE_API_KEY:       ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_REFRESH_TOKEN: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
          # aktive Stunden: 3 Messungen a 8 Min ~ 16 Min Abdeckung (kurz genug, um den
          # 30-Min-Cron nicht zu ueberlappen). Nachts nur 1 Messung.
          SAMPLES_DAY:      ${{ github.event.inputs.samples || '3' }}
          INTERVAL_SECONDS: ${{ github.event.inputs.interval_seconds || '480' }}
        run: |
          set -u
          git config user.name  "gym-tracker[bot]"
          git config user.email "gym-tracker@users.noreply.github.com"

          # Nachts (Berlin 23-05 Uhr) nur 1 Messung: spart Compute, Nachtwerte sind ~0
          BERLIN_H=$(TZ='Europe/Berlin' date +%H)
          if [ "${BERLIN_H}" -ge 5 ] && [ "${BERLIN_H}" -lt 23 ]; then
            SAMPLES="${SAMPLES_DAY}"
          else
            SAMPLES=1
          fi
          echo "Berlin-Stunde ${BERLIN_H} -> ${SAMPLES} Messung(en)"

          for i in $(seq 1 "${SAMPLES}"); do
            echo "::group::Sample ${i}/${SAMPLES} ($(date -u '+%H:%M:%S') UTC)"

            # eine Messung (frischer Token-Refresh je Aufruf); einzelner Fehler killt den Lauf nicht
            python gym_tracker.py || echo "WARN: Messung ${i} fehlgeschlagen, weiter"

            git add --all data/
            if git diff --cached --quiet; then
              echo "keine neuen Daten"
            else
              git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC"
              # robustes Push: gegen parallele Bot-Commits rebasen, mit Retry
              pushed=0
              for try in 1 2 3; do
                if git pull --rebase --autostash origin main && git push origin main; then
                  pushed=1; break
                fi
                echo "push-Retry ${try}"; sleep 5
              done
              [ "${pushed}" = 1 ] || echo "WARN: push nach 3 Versuchen fehlgeschlagen"
            fi

            echo "::endgroup::"
            if [ "${i}" -lt "${SAMPLES}" ]; then sleep "${INTERVAL_SECONDS}"; fi
          done
