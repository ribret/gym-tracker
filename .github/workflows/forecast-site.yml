name: Forecast Site (GitHub Pages)

# Baut die Prognose-Seite und veroeffentlicht sie auf GitHub Pages — ohne extra Hosting.
# - "Knopfdruck": Actions-Tab -> "Forecast Site" -> "Run workflow"
# - automatisch: 3x taeglich (krumme Minute, weil GitHub schedule-Trigger unter
#   Last droppt; 3 Versuche/Tag machen mind. einen erfolgreichen Lauf sehr sicher)
# Das Modell trainiert bei jedem Build frisch auf dem kompletten CSV -> die
# Prognose verbessert sich automatisch mit jedem gesammelten Datentag.
#
# VEROEFFENTLICHUNGS-MECHANISMUS: Force-Push der gebauten Seite auf den
# gh-pages-Branch (= Pages-Quelle). Bewusst NICHT actions/deploy-pages: das
# Anlegen/Umstellen der Pages-Site per API braucht Admin-Rechte, die der
# GITHUB_TOKEN nicht hat ("Resource not accessible by integration"), und das
# github-pages-Environment laesst nur gh-pages-Deploys zu. Der gh-pages-Push
# triggert GitHubs eigenen "pages build and deployment"-Lauf (.nojekyll liegt
# bei). Force-Push haelt gh-pages bei genau einem Commit -> kein Repo-Bloat.

on:
  schedule:
    - cron: "23 4,10,15 * * *"   # ~06:23 / 12:23 / 17:23 Berlin (Sommerzeit)
  workflow_dispatch:

permissions:
  contents: write

# nur ein Pages-Publish gleichzeitig; laufende nicht abbrechen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main = aktuellster Datenstand)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependencies
        run: pip install "pandas>=2.0" "numpy>=1.24" "scikit-learn>=1.4"

      - name: Seite bauen
        env:
          OMP_NUM_THREADS: "1"
        run: python forecast/build_site.py --out-dir _site

      - name: Auf gh-pages veroeffentlichen
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd _site
          git init -b gh-pages
          git config user.name  "gym-tracker[bot]"
          git config user.email "gym-tracker@users.noreply.github.com"
          git add -A
          git commit -m "pages: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
